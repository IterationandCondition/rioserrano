<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Río Serrano Hotel + Spa · Consulta de Disponibilidad</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --ink: #1a1f1c;
    --ink-muted: #5b6660;
    --ink-soft: #8a948e;
    --accent: #2f5d4f;
    --accent-soft: #e6efe9;
    --border: #e3e0d8;
    --danger: #a13c2e;
    --warn-bg: #fdf1e5;
    --warn-ink: #7a4a16;
    --urgency-bg: #fef0e8;
    --urgency-ink: #b04020;
    --ok-bg: #e6f0e9;
    --ok-ink: #2f5d4f;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 24px rgba(0,0,0,.06);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 12px 40px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
  }
  header { background: var(--ink); color: white; padding: 18px 24px; }
  header .brand {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header .brand h1 { margin: 0; font-size: 18px; font-weight: 500; }
  header .brand .sub {
    font-size: 12px; color: rgba(255,255,255,.65);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .hero {
    background: linear-gradient(180deg, #2a3d36 0%, #1a2622 100%);
    color: white; padding: 56px 24px 72px; text-align: center;
  }
  .hero h2 { font-size: 32px; font-weight: 400; margin: 0 0 12px; }
  .hero p {
    color: rgba(255,255,255,.75); max-width: 560px; margin: 0 auto; font-size: 15px;
  }
  main { max-width: 1100px; margin: -48px auto 48px; padding: 0 24px; position: relative; }
  .search-card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 24px;
  }
  .search-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto;
    gap: 12px; align-items: end;
  }
  @media (max-width: 760px) {
    .search-grid { grid-template-columns: 1fr 1fr; }
    .search-grid .btn-cell { grid-column: 1 / -1; }
  }
  .field label {
    display: block; font-size: 11px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; border: 1px solid var(--border); background: white;
    border-radius: 8px; padding: 10px 12px; font-size: 15px;
    font-family: inherit; color: var(--ink);
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  button.primary {
    background: var(--accent); color: white; border: 0;
    border-radius: 8px; padding: 11px 22px; font-size: 15px;
    font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  button.primary:hover { background: #244a3f; }
  button.primary:disabled { background: var(--ink-soft); cursor: wait; }
  .status { margin: 20px 0 8px; font-size: 14px; color: var(--ink-muted); min-height: 20px; }
  .status.err { color: var(--danger); }

  .results-header {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 20px 24px; margin-top: 16px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .results-header .info h3 { margin: 0 0 2px; font-size: 20px; font-weight: 500; }
  .results-header .info p { margin: 0; color: var(--ink-muted); font-size: 13px; }
  .results-header .counter {
    background: var(--accent-soft); color: var(--accent);
    padding: 6px 12px; border-radius: 100px; font-size: 13px; font-weight: 500;
  }

  .rooms-grid {
    display: flex; flex-direction: column; gap: 16px; margin-top: 16px;
  }

  .room-card {
    background: var(--surface); border-radius: 12px; overflow: hidden;
    box-shadow: var(--shadow); display: grid;
    grid-template-columns: 320px 1fr; transition: box-shadow .2s;
  }
  .room-card:hover { box-shadow: var(--shadow-lg); }
  .room-card.unavail { opacity: 0.55; }

  @media (max-width: 760px) {
    .room-card { grid-template-columns: 1fr; }
  }

  .room-image {
    background-size: cover; background-position: center;
    background-color: #ddd; min-height: 240px; position: relative;
  }
  .room-image .urgency-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--urgency-bg); color: var(--urgency-ink);
    padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .room-image .code-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,.55); color: white;
    padding: 3px 9px; border-radius: 4px;
    font-size: 10px; letter-spacing: 0.08em;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .room-body { padding: 20px 22px; }
  .room-body h3 { margin: 0 0 8px; font-size: 21px; font-weight: 500; }
  .room-body .desc {
    color: var(--ink-muted); font-size: 14px; margin: 0 0 14px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .features {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-bottom: 14px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .feature {
    font-size: 12px; color: var(--ink-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .feature strong { color: var(--ink); font-weight: 500; }

  .amenities-list {
    font-size: 12px; color: var(--ink-muted);
    margin-bottom: 16px; line-height: 1.7;
  }
  .amenity-pill {
    display: inline-block; background: var(--bg);
    padding: 2px 8px; border-radius: 4px; margin: 0 4px 4px 0;
  }
  .amenity-pill.premium {
    background: var(--accent-soft); color: var(--accent);
  }

  .rates {
    display: flex; flex-direction: column; gap: 8px;
  }
  .rate-option {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg); padding: 10px 14px; border-radius: 8px;
    gap: 12px;
  }
  .rate-option .plan {
    flex: 1; min-width: 0;
  }
  .rate-option .plan-name {
    font-size: 13px; font-weight: 500; color: var(--ink);
  }
  .rate-option .plan-detail {
    font-size: 11px; color: var(--ink-soft); margin-top: 2px;
  }
  .rate-option .price { text-align: right; }
  .rate-option .price .per-night {
    font-size: 17px; font-weight: 500; color: var(--ink); line-height: 1;
  }
  .rate-option .price .per-night small { font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .rate-option .price .total {
    font-size: 11px; color: var(--ink-muted); margin-top: 3px;
  }

  .room-cta {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  }
  .room-cta .stock {
    font-size: 12px; color: var(--ink-muted); margin-right: auto;
  }
  .room-cta a {
    background: var(--ink); color: white; text-decoration: none;
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .room-cta a:hover { background: #2c322f; }

  footer {
    text-align: center; padding: 32px 24px;
    color: var(--ink-soft); font-size: 12px;
  }
  .skeleton {
    background: linear-gradient(90deg, #f0eee7 0%, #fafaf7 50%, #f0eee7 100%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .empty-state {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 48px 24px;
    text-align: center; margin-top: 16px;
  }
  .empty-state h3 { margin: 0 0 8px; font-weight: 500; }
  .empty-state p { margin: 0; color: var(--ink-muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Río Serrano Hotel + Spa</h1>
    <span class="sub">Torres del Paine · Patagonia</span>
  </div>
</header>

<section class="hero">
  <h2>Habitaciones disponibles</h2>
  <p>Disponibilidad y tarifas en tiempo real, directo del motor de reservas oficial.</p>
</section>

<main>
  <div class="search-card">
    <form id="form-search" class="search-grid">
      <div class="field">
        <label for="check_in">Check-in</label>
        <input type="date" id="check_in" required>
      </div>
      <div class="field">
        <label for="check_out">Check-out</label>
        <input type="date" id="check_out" required>
      </div>
      <div class="field">
        <label for="adultos">Adultos</label>
        <select id="adultos">
          <option>1</option>
          <option selected>2</option>
          <option>3</option>
          <option>4</option>
        </select>
      </div>
      <div class="field">
        <label for="ninos">Niños</label>
        <select id="ninos">
          <option selected>0</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>
      </div>
      <div class="btn-cell">
        <button type="submit" class="primary" id="btn-search">Consultar</button>
      </div>
    </form>
    <div class="status" id="status"></div>
  </div>

  <div id="result"></div>
</main>

<footer>
  Demo conectada directamente al motor de reservas oficial del hotel.<br>
  Para reservar, ingresa a <a href="https://rioserrano.com" style="color:inherit">rioserrano.com</a>.
</footer>

<script>
const $ = id => document.getElementById(id);

// Fechas por defecto: arrancar desde septiembre 2026
(function initDates() {
  const today = new Date();
  // Si hoy es antes de septiembre 2026, default a 15 sep 2026 / 17 sep 2026
  // Si ya pasó septiembre 2026, default a 30 días desde hoy
  let dIn, dOut;
  const sep15_2026 = new Date('2026-09-15');
  if (today < sep15_2026) {
    dIn  = new Date('2026-09-15');
    dOut = new Date('2026-09-17');
  } else {
    dIn  = new Date(today); dIn.setDate(today.getDate() + 30);
    dOut = new Date(today); dOut.setDate(today.getDate() + 32);
  }
  const fmt = d => d.toISOString().slice(0, 10);
  $('check_in').value = fmt(dIn);
  $('check_out').value = fmt(dOut);
  $('check_in').min = fmt(today);
  $('check_out').min = fmt(dIn);
})();

$('check_in').addEventListener('change', e => {
  const d = new Date(e.target.value);
  d.setDate(d.getDate() + 1);
  $('check_out').min = d.toISOString().slice(0, 10);
  if ($('check_out').value <= e.target.value) {
    $('check_out').value = d.toISOString().slice(0, 10);
  }
});

function fmtMoney(n, currency) {
  return new Intl.NumberFormat('es-CL', {
    style: 'currency', currency: currency || 'USD',
    maximumFractionDigits: 0,
  }).format(n);
}

function fmtDate(yyyymmdd) {
  const [y, m, d] = yyyymmdd.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
}

function statusMsg(text, isError = false) {
  const s = $('status');
  s.textContent = text;
  s.className = 'status' + (isError ? ' err' : '');
}

function renderSkeleton() {
  $('result').innerHTML = `
    <div class="rooms-grid">
      ${Array(3).fill().map(() => `
        <div class="skeleton" style="height: 280px;"></div>
      `).join('')}
    </div>
  `;
}

async function buscar(e) {
  e.preventDefault();
  const checkIn  = $('check_in').value;
  const checkOut = $('check_out').value;
  const adultos  = $('adultos').value;
  const ninos    = $('ninos').value;

  if (checkOut <= checkIn) {
    statusMsg('La fecha de salida debe ser posterior a la de entrada.', true);
    return;
  }

  $('btn-search').disabled = true;
  $('btn-search').textContent = 'Consultando…';
  statusMsg('Conectando con el motor de reservas. La primera consulta puede tardar 30-60 segundos…');
  renderSkeleton();

  try {
    const url = `/api/disponibilidad?check_in=${checkIn}&check_out=${checkOut}&adultos=${adultos}&ninos=${ninos}`;
    const r = await fetch(url);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${r.status}`);
    }
    const data = await r.json();
    renderResult(data);
    statusMsg('');
  } catch (err) {
    statusMsg('No se pudo obtener disponibilidad: ' + err.message, true);
    $('result').innerHTML = '';
  } finally {
    $('btn-search').disabled = false;
    $('btn-search').textContent = 'Consultar';
  }
}

function renderResult(data) {
  const { habitaciones, noches, moneda, check_in, check_out, adultos, ninos } = data;
  const disponibles = habitaciones.filter(h => h.disponible);

  if (habitaciones.length === 0) {
    $('result').innerHTML = `
      <div class="empty-state">
        <h3>Sin habitaciones para estas fechas</h3>
        <p>Prueba con un rango distinto o consulta directamente al hotel.</p>
      </div>
    `;
    return;
  }

  const header = `
    <div class="results-header">
      <div class="info">
        <h3>${fmtDate(check_in)} → ${fmtDate(check_out)}</h3>
        <p>${noches} ${noches === 1 ? 'noche' : 'noches'} · ${adultos} adultos${ninos > 0 ? ` · ${ninos} niños` : ''}</p>
      </div>
      <div class="counter">${disponibles.length} de ${habitaciones.length} tipos disponibles</div>
    </div>
  `;

  const rooms = habitaciones.map(h => renderRoom(h, moneda, check_in, check_out)).join('');

  $('result').innerHTML = header + `<div class="rooms-grid">${rooms}</div>`;
}

function renderRoom(h, moneda, checkIn, checkOut) {
  const imgBg = h.imagen_principal
    ? `style="background-image: url('${h.imagen_principal}')"`
    : '';

  const urgency = h.urgencia
    ? `<span class="urgency-badge">¡Quedan pocas!</span>`
    : '';

  // Features (capacidad, m², camas)
  const featuresHtml = (h.features || []).map(f => {
    const cantidad = f.cantidad ? `<strong>${f.cantidad}</strong>` : '';
    const label = f.tipo === 'Size' ? 'm²' :
                  f.tipo === 'Occupancy' ? (f.cantidad === 1 ? 'persona' : 'personas') :
                  f.nombre;
    return `<span class="feature">${cantidad} ${label}</span>`;
  }).join('');

  // Amenidades (limitar a 8 por compactness)
  const amenities = (h.amenidades || []).slice(0, 8);
  const amenitiesHtml = amenities.map(a =>
    `<span class="amenity-pill ${a.premium ? 'premium' : ''}">${a.nombre}</span>`
  ).join('');
  const moreAmenities = (h.amenidades || []).length > 8
    ? `<span class="amenity-pill">+${h.amenidades.length - 8} más</span>`
    : '';

  // Tarifas
  const ratesHtml = (h.tarifas || []).filter(t => t.disponible).map(t => `
    <div class="rate-option">
      <div class="plan">
        <div class="plan-name">${t.rate_plan_nombre}</div>
      </div>
      <div class="price">
        <div class="per-night">${fmtMoney(t.tarifa_promedio_noche, moneda)} <small>/noche</small></div>
        <div class="total">Total: ${fmtMoney(t.tarifa_total, moneda)}</div>
      </div>
    </div>
  `).join('');

  const stock = h.cantidad_disponible > 0
    ? `${h.cantidad_disponible} ${h.cantidad_disponible === 1 ? 'habitación' : 'habitaciones'} disponibles`
    : 'Sin disponibilidad';

  const bookUrl = `https://bookings.travelclick.com/99498?datein=${checkIn}&dateout=${checkOut}`;

  return `
    <article class="room-card ${h.disponible ? '' : 'unavail'}">
      <div class="room-image" ${imgBg}>
        ${urgency}
        ${h.codigo ? `<span class="code-badge">${h.codigo}</span>` : ''}
      </div>
      <div class="room-body">
        <h3>${h.nombre}</h3>
        <p class="desc">${h.descripcion}</p>

        ${featuresHtml ? `<div class="features">${featuresHtml}</div>` : ''}

        ${amenitiesHtml ? `<div class="amenities-list">${amenitiesHtml}${moreAmenities}</div>` : ''}

        ${h.disponible ? `<div class="rates">${ratesHtml}</div>` : ''}

        <div class="room-cta">
          <span class="stock">${stock}</span>
          ${h.disponible
            ? `<a href="${bookUrl}" target="_blank" rel="noopener">Reservar →</a>`
            : `<span class="stock">No disponible para estas fechas</span>`}
        </div>
      </div>
    </article>
  `;
}

$('form-search').addEventListener('submit', buscar);
</script>

</body>
</html>
