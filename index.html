<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Río Serrano Hotel + Spa · Consulta de Disponibilidad</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --ink: #1a1f1c;
    --ink-muted: #5b6660;
    --ink-soft: #8a948e;
    --accent: #2f5d4f;
    --accent-soft: #e6efe9;
    --border: #e3e0d8;
    --danger: #a13c2e;
    --warn-bg: #fdf1e5;
    --warn-ink: #7a4a16;
    --ok-bg: #e6f0e9;
    --ok-ink: #2f5d4f;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 24px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
  }
  header { background: var(--ink); color: white; padding: 18px 24px; }
  header .brand {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header .brand h1 { margin: 0; font-size: 18px; font-weight: 500; }
  header .brand .sub {
    font-size: 12px; color: rgba(255,255,255,.65);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .hero {
    background: linear-gradient(180deg, #2a3d36 0%, #1a2622 100%);
    color: white; padding: 64px 24px 80px; text-align: center;
  }
  .hero h2 { font-size: 34px; font-weight: 400; margin: 0 0 12px; }
  .hero p {
    color: rgba(255,255,255,.75); max-width: 560px; margin: 0 auto; font-size: 16px;
  }
  main { max-width: 1100px; margin: -52px auto 48px; padding: 0 24px; position: relative; }
  .search-card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 24px;
  }
  .search-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto;
    gap: 12px; align-items: end;
  }
  @media (max-width: 760px) {
    .search-grid { grid-template-columns: 1fr 1fr; }
    .search-grid .btn-cell { grid-column: 1 / -1; }
  }
  .field label {
    display: block; font-size: 11px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; border: 1px solid var(--border); background: white;
    border-radius: 8px; padding: 10px 12px; font-size: 15px;
    font-family: inherit; color: var(--ink);
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  button.primary {
    background: var(--accent); color: white; border: 0;
    border-radius: 8px; padding: 11px 22px; font-size: 15px;
    font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  button.primary:hover { background: #244a3f; }
  button.primary:disabled { background: var(--ink-soft); cursor: wait; }
  .status { margin: 20px 0 8px; font-size: 14px; color: var(--ink-muted); min-height: 20px; }
  .status.err { color: var(--danger); }
  .result {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 28px; margin-top: 16px;
  }
  .summary {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 16px; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .summary .dates h3 { margin: 0 0 4px; font-size: 22px; font-weight: 500; }
  .summary .dates p { margin: 0; color: var(--ink-muted); font-size: 14px; }
  .summary .price { text-align: right; }
  .summary .price .badge {
    display: inline-block; font-size: 11px; padding: 4px 10px;
    border-radius: 100px; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .summary .price .badge.ok { background: var(--ok-bg); color: var(--ok-ink); }
  .summary .price .badge.warn { background: var(--warn-bg); color: var(--warn-ink); }
  .summary .price .total { font-size: 28px; font-weight: 500; line-height: 1; }
  .summary .price .total small { font-size: 13px; color: var(--ink-soft); font-weight: 400; }
  .summary .price .avg { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }
  h4.section {
    margin: 0 0 14px; font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-soft); font-weight: 500;
  }
  .calendar {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .day {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; background: white; font-size: 13px;
  }
  .day.in-stay { border-color: var(--accent); background: var(--accent-soft); }
  .day.unavail { opacity: 0.5; background: #fafaf7; }
  .day .date { font-weight: 500; margin-bottom: 2px; }
  .day .rate { font-size: 14px; }
  .day .rate.zero { color: var(--ink-soft); }
  .day .state {
    font-size: 10px; color: var(--ink-soft);
    text-transform: uppercase; margin-top: 2px;
  }
  .cta-bar {
    margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .cta-bar p { margin: 0; color: var(--ink-muted); font-size: 13px; }
  .cta-bar a {
    background: var(--ink); color: white; text-decoration: none;
    padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
  }
  footer {
    text-align: center; padding: 32px 24px;
    color: var(--ink-soft); font-size: 12px;
  }
  .skeleton {
    background: linear-gradient(90deg, #f0eee7 0%, #fafaf7 50%, #f0eee7 100%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Río Serrano Hotel + Spa</h1>
    <span class="sub">Torres del Paine · Patagonia</span>
  </div>
</header>

<section class="hero">
  <h2>Consulta tu estadía</h2>
  <p>Disponibilidad y tarifas en tiempo real, directo del motor de reservas oficial.</p>
</section>

<main>
  <div class="search-card">
    <form id="form-search" class="search-grid">
      <div class="field">
        <label for="check_in">Check-in</label>
        <input type="date" id="check_in" required>
      </div>
      <div class="field">
        <label for="check_out">Check-out</label>
        <input type="date" id="check_out" required>
      </div>
      <div class="field">
        <label for="adultos">Adultos</label>
        <select id="adultos">
          <option>1</option>
          <option selected>2</option>
          <option>3</option>
          <option>4</option>
        </select>
      </div>
      <div class="field">
        <label for="ninos">Niños</label>
        <select id="ninos">
          <option selected>0</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>
      </div>
      <div class="btn-cell">
        <button type="submit" class="primary" id="btn-search">Consultar</button>
      </div>
    </form>
    <div class="status" id="status"></div>
  </div>

  <div id="result"></div>
</main>

<footer>
  Demo de consulta directa al motor del hotel.<br>
  Para reservar, ingresa a <a href="https://rioserrano.com" style="color:inherit">rioserrano.com</a>.
</footer>

<script>
const $ = id => document.getElementById(id);

(function initDates() {
  const today = new Date();
  const dIn  = new Date(today); dIn.setDate(today.getDate() + 30);
  const dOut = new Date(today); dOut.setDate(today.getDate() + 32);
  const fmt = d => d.toISOString().slice(0, 10);
  $('check_in').value = fmt(dIn);
  $('check_out').value = fmt(dOut);
  $('check_in').min = fmt(today);
  $('check_out').min = fmt(dIn);
})();

$('check_in').addEventListener('change', e => {
  const d = new Date(e.target.value);
  d.setDate(d.getDate() + 1);
  $('check_out').min = d.toISOString().slice(0, 10);
  if ($('check_out').value <= e.target.value) {
    $('check_out').value = d.toISOString().slice(0, 10);
  }
});

function fmtMoney(n, currency) {
  return new Intl.NumberFormat('es-CL', {
    style: 'currency', currency: currency || 'USD',
    maximumFractionDigits: 0,
  }).format(n);
}

function fmtDate(yyyymmdd) {
  const [y, m, d] = yyyymmdd.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
}

function statusMsg(text, isError = false) {
  const s = $('status');
  s.textContent = text;
  s.className = 'status' + (isError ? ' err' : '');
}

function renderSkeleton() {
  $('result').innerHTML = `
    <div class="result">
      <div class="skeleton" style="height: 60px; margin-bottom: 24px;"></div>
      <div class="calendar">
        ${Array(14).fill().map(() => '<div class="skeleton" style="height: 70px;"></div>').join('')}
      </div>
    </div>
  `;
}

async function buscar(e) {
  e.preventDefault();
  const checkIn  = $('check_in').value;
  const checkOut = $('check_out').value;
  const adultos  = $('adultos').value;
  const ninos    = $('ninos').value;

  if (checkOut <= checkIn) {
    statusMsg('La fecha de salida debe ser posterior a la de entrada.', true);
    return;
  }

  $('btn-search').disabled = true;
  $('btn-search').textContent = 'Consultando…';
  statusMsg('Conectando con el motor de reservas. La primera consulta puede tardar 30-60 segundos…');
  renderSkeleton();

  try {
    // URL relativa: como frontend y backend viven en el mismo servidor, no necesita dominio
    const url = `/api/disponibilidad?check_in=${checkIn}&check_out=${checkOut}&adultos=${adultos}&ninos=${ninos}`;
    const r = await fetch(url);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${r.status}`);
    }
    const data = await r.json();
    renderResult(data);
    statusMsg('');
  } catch (err) {
    statusMsg('No se pudo obtener disponibilidad: ' + err.message, true);
    $('result').innerHTML = '';
  } finally {
    $('btn-search').disabled = false;
    $('btn-search').textContent = 'Consultar';
  }
}

function renderResult(data) {
  const noches = data.noches;
  const moneda = data.moneda;
  const disponible = data.estadia_disponible;
  const total = data.total_estadia;
  const prom  = data.tarifa_promedio_noche;

  const badge = disponible
    ? `<span class="badge ok">Disponible</span>`
    : `<span class="badge warn">Sin disponibilidad completa</span>`;

  const priceBlock = disponible
    ? `${badge}
       <div class="total">${fmtMoney(total, moneda)} <small>total</small></div>
       <div class="avg">${fmtMoney(prom, moneda)} promedio por noche</div>`
    : `${badge}
       <div class="avg">Una o más noches del rango están cerradas. Revisa el calendario abajo.</div>`;

  const daysHtml = data.dias.map(d => {
    const inStay = d.fecha >= data.check_in && d.fecha < data.check_out;
    const cls = ['day'];
    if (inStay) cls.push('in-stay');
    if (!d.disponible) cls.push('unavail');

    const rateHtml = d.tarifa_minima > 0
      ? `<div class="rate">${fmtMoney(d.tarifa_minima, moneda)}</div>`
      : `<div class="rate zero">—</div>`;

    return `
      <div class="${cls.join(' ')}">
        <div class="date">${fmtDate(d.fecha)}</div>
        ${rateHtml}
        <div class="state">${prettyState(d.estado, d.disponible)}</div>
      </div>
    `;
  }).join('');

  $('result').innerHTML = `
    <div class="result">
      <div class="summary">
        <div class="dates">
          <h3>${fmtDate(data.check_in)} → ${fmtDate(data.check_out)}</h3>
          <p>${noches} ${noches === 1 ? 'noche' : 'noches'} · ${$('adultos').value} adultos${$('ninos').value > 0 ? ` · ${$('ninos').value} niños` : ''}</p>
        </div>
        <div class="price">${priceBlock}</div>
      </div>

      <h4 class="section">Calendario (incluye 14 días extra)</h4>
      <div class="calendar">${daysHtml}</div>

      <div class="cta-bar">
        <p>${disponible
          ? '¿Te acomoda? Sigue tu reserva en el motor oficial.'
          : 'Ajusta la búsqueda o mira fechas cercanas.'}</p>
        <a href="https://bookings.travelclick.com/99498?datein=${data.check_in}&dateout=${data.check_out}" target="_blank" rel="noopener">
          ${disponible ? 'Reservar →' : 'Ver en el motor →'}
        </a>
      </div>
    </div>
  `;
}

function prettyState(s, available) {
  if (available) return 'Disponible';
  return ({
    'NoAvailability':  'Sin cupo',
    'ClosedOut':       'Cerrado',
    'PropertyClosed':  'Hotel cerrado',
    'RateNotSetUp':    'Sin tarifa',
  })[s] || s || '';
}

$('form-search').addEventListener('submit', buscar);
</script>

</body>
</html>
